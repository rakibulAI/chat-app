
name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
      - name: Unzip project
        run: unzip chat_app_flutter.zip -d .
      - name: Flutter pub get
        run: cd chat_app && flutter pub get
      - name: Build APK
        run: cd chat_app && flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: chat_app/build/app/outputs/flutter-apk/app-release.apk
