name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create Flutter project
        run: flutter create --org com.chatapp --project-name chat_app myapp

      - name: Copy HTML into assets
        run: |
          mkdir -p myapp/assets/web
          unzip chat_app_flutter.zip
          cp chat_app/assets/web/index.html myapp/assets/web/index.html

      - name: Update pubspec
        run: |
          cat > myapp/pubspec.yaml << 'EOF'
          name: chat_app
          description: চ্যাট অ্যাপ
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.2
          dev_dependencies:
            flutter_test:
              sdk: flutter
          flutter:
            uses-material-design: true
            assets:
              - assets/web/index.html
          EOF

      - name: Copy main.dart
        run: |
          unzip chat_app_flutter.zip
          cp chat_app/lib/main.dart myapp/lib/main.dart

      - name: Flutter pub get
        run: cd myapp && flutter pub get

      - name: Build APK
        run: cd myapp && flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: myapp/build/app/outputs/flutter-apk/app-release.apk
