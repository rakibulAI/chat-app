<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NeuralChat</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #13131a;
    --bg3: #1c1c28;
    --card: #1e1e2e;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #56ccf2;
    --text: #e8e8f0;
    --text2: #9090a8;
    --border: #2a2a3e;
    --green: #2ecc71;
    --online: #00e676;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; font-family:'Hind Siliguri',sans-serif; background:var(--bg); color:var(--text); }

  /* SPLASH */
  #splash {
    position:fixed; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999; transition:opacity .5s ease;
  }
  .splash-logo {
    width:90px; height:90px; border-radius:28px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:40px; margin-bottom:20px;
    box-shadow:0 0 40px rgba(124,92,252,.5);
    animation: pulse 1.5s ease infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  .splash-title { font-size:28px; font-weight:700; color:var(--text); }
  .splash-sub { font-size:14px; color:var(--text2); margin-top:6px; }
  .splash-bar { width:160px; height:3px; background:var(--bg3); border-radius:3px; margin-top:36px; overflow:hidden; }
  .splash-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); animation:fill 1.8s ease forwards; }
  @keyframes fill { from{width:0} to{width:100%} }

  /* LAYOUT */
  #app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  /* SCREENS */
  .screen { display:none; flex:1; flex-direction:column; overflow:hidden; }
  .screen.active { display:flex; }

  /* ===== AUTH SCREEN ===== */
  #auth-screen {
    background: linear-gradient(160deg, #0a0a1a 0%, #12112a 50%, #0f1020 100%);
    align-items:center; justify-content:center; padding:30px 24px;
  }
  .auth-logo {
    width:80px; height:80px; border-radius:24px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center; font-size:36px;
    box-shadow:0 8px 32px rgba(124,92,252,.4); margin-bottom:24px;
  }
  .auth-title { font-size:26px; font-weight:700; text-align:center; margin-bottom:6px; }
  .auth-sub { font-size:14px; color:var(--text2); text-align:center; margin-bottom:36px; }
  .auth-form { width:100%; max-width:340px; }
  .auth-input {
    width:100%; padding:14px 18px; border-radius:14px;
    background:var(--bg3); border:1.5px solid var(--border);
    color:var(--text); font-size:15px; font-family:inherit;
    margin-bottom:14px; outline:none; transition:.2s;
  }
  .auth-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,92,252,.2); }
  .auth-btn {
    width:100%; padding:15px; border-radius:14px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; font-size:16px; font-weight:600; font-family:inherit;
    border:none; cursor:pointer; margin-bottom:14px;
    box-shadow:0 4px 20px rgba(124,92,252,.4);
    transition:.2s; letter-spacing:.3px;
  }
  .auth-btn:active { transform:scale(.97); }
  .auth-switch { text-align:center; font-size:14px; color:var(--text2); }
  .auth-switch a { color:var(--accent); text-decoration:none; font-weight:600; }
  .avatar-pick { display:flex; gap:10px; justify-content:center; margin-bottom:18px; flex-wrap:wrap; }
  .avatar-opt {
    width:52px; height:52px; border-radius:50%; font-size:26px;
    display:flex; align-items:center; justify-content:center;
    background:var(--bg3); border:2px solid var(--border);
    cursor:pointer; transition:.2s;
  }
  .avatar-opt.selected { border-color:var(--accent); transform:scale(1.1); box-shadow:0 0 12px rgba(124,92,252,.5); }

  /* ===== TOP BAR ===== */
  .topbar {
    padding:14px 18px 10px;
    background:var(--bg);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
    flex-shrink:0;
  }
  .topbar-title { font-size:20px; font-weight:700; flex:1; }
  .topbar-back { font-size:22px; cursor:pointer; padding:4px; }
  .topbar-icon {
    width:38px; height:38px; border-radius:12px;
    background:var(--bg3); border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:18px;
    transition:.2s;
  }
  .topbar-icon:active { transform:scale(.92); }

  /* ===== BOTTOM NAV ===== */
  .bottom-nav {
    display:flex; background:var(--bg); border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom,0); flex-shrink:0;
  }
  .nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center;
    padding:10px 0 8px; cursor:pointer; transition:.2s; position:relative;
  }
  .nav-item .ni { font-size:22px; line-height:1; }
  .nav-item .nl { font-size:10px; color:var(--text2); margin-top:3px; transition:.2s; }
  .nav-item.active .nl { color:var(--accent); }
  .nav-item.active .ni { filter:drop-shadow(0 0 6px var(--accent)); }
  .nav-dot {
    position:absolute; top:7px; right:calc(50% - 14px);
    width:8px; height:8px; border-radius:50%; background:var(--accent2);
    border:2px solid var(--bg);
  }

  /* ===== HOME (CHATS) ===== */
  #home-screen { background:var(--bg); }
  .search-bar {
    margin:12px 16px; display:flex; align-items:center; gap:10px;
    background:var(--bg3); border-radius:14px; padding:10px 16px;
    border:1.5px solid var(--border);
  }
  .search-bar input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-size:14px; font-family:inherit;
  }

  /* Story Row */
  .story-row { padding:4px 0 14px; overflow-x:auto; display:flex; gap:12px; padding-left:16px; flex-shrink:0; }
  .story-row::-webkit-scrollbar { display:none; }
  .story-item { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; flex-shrink:0; }
  .story-ring {
    width:60px; height:60px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    padding:2.5px; position:relative;
  }
  .story-ring .inner {
    width:100%; height:100%; border-radius:50%; background:var(--bg);
    display:flex; align-items:center; justify-content:center; font-size:26px;
    border:2px solid var(--bg);
  }
  .story-ring.seen { background:var(--bg3); }
  .story-add-btn {
    position:absolute; bottom:0; right:0;
    width:20px; height:20px; border-radius:50%;
    background:var(--accent); color:#fff; font-size:14px;
    display:flex; align-items:center; justify-content:center;
    border:2px solid var(--bg);
  }
  .story-name { font-size:11px; color:var(--text2); max-width:60px; text-align:center; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }

  /* Chat List */
  .chat-list { flex:1; overflow-y:auto; padding:0 0 8px; }
  .chat-list::-webkit-scrollbar { display:none; }
  .chat-item {
    display:flex; align-items:center; gap:14px;
    padding:12px 18px; cursor:pointer; transition:.15s;
    border-bottom:1px solid rgba(255,255,255,.04);
  }
  .chat-item:active { background:var(--bg3); }
  .chat-avatar {
    width:52px; height:52px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:26px;
    background:var(--bg3); position:relative;
  }
  .online-dot {
    position:absolute; bottom:1px; right:1px;
    width:13px; height:13px; border-radius:50%;
    background:var(--online); border:2px solid var(--bg);
  }
  .chat-info { flex:1; min-width:0; }
  .chat-name { font-size:15px; font-weight:600; margin-bottom:3px; }
  .chat-preview { font-size:13px; color:var(--text2); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  .chat-meta { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
  .chat-time { font-size:11px; color:var(--text2); }
  .chat-badge {
    background:var(--accent); color:#fff; font-size:11px; font-weight:700;
    min-width:18px; height:18px; border-radius:9px; display:flex; align-items:center; justify-content:center;
    padding:0 5px;
  }

  /* ===== CHAT SCREEN ===== */
  #chat-screen { background:var(--bg); }
  .chat-topbar { padding:12px 16px 10px; background:var(--bg); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .ct-avatar { width:40px; height:40px; border-radius:50%; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:22px; position:relative; }
  .ct-info { flex:1; }
  .ct-name { font-size:16px; font-weight:700; }
  .ct-status { font-size:12px; color:var(--online); }

  .messages { flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:8px; }
  .messages::-webkit-scrollbar { display:none; }

  .msg-group { display:flex; flex-direction:column; gap:3px; }
  .msg-row { display:flex; align-items:flex-end; gap:8px; }
  .msg-row.mine { flex-direction:row-reverse; }

  .bubble {
    max-width:72%; padding:10px 14px; border-radius:18px;
    font-size:14px; line-height:1.5; position:relative;
    word-break:break-word;
  }
  .bubble.them { background:var(--bg3); border-bottom-left-radius:5px; color:var(--text); }
  .bubble.mine { background:linear-gradient(135deg, var(--accent), #5a3fd4); border-bottom-right-radius:5px; color:#fff; }
  .bubble-time { font-size:10px; opacity:.6; margin-top:4px; text-align:right; }

  .bubble-img { max-width:200px; border-radius:14px; overflow:hidden; cursor:pointer; }
  .bubble-img img { width:100%; display:block; }

  .voice-bubble {
    display:flex; align-items:center; gap:10px; padding:10px 14px;
    background:var(--bg3); border-radius:18px; border-bottom-left-radius:5px;
    min-width:160px; cursor:pointer;
  }
  .voice-bubble.mine { background:linear-gradient(135deg, var(--accent), #5a3fd4); border-bottom-left-radius:18px; border-bottom-right-radius:5px; }
  .play-btn { font-size:20px; }
  .voice-wave { display:flex; align-items:center; gap:2px; flex:1; }
  .wbar { width:3px; border-radius:2px; background:rgba(255,255,255,.4); animation:wave 1s ease infinite; }
  .wbar:nth-child(1){height:8px; animation-delay:.0s}
  .wbar:nth-child(2){height:14px; animation-delay:.1s}
  .wbar:nth-child(3){height:20px; animation-delay:.2s}
  .wbar:nth-child(4){height:12px; animation-delay:.3s}
  .wbar:nth-child(5){height:18px; animation-delay:.4s}
  .wbar:nth-child(6){height:10px; animation-delay:.5s}
  .wbar:nth-child(7){height:16px; animation-delay:.6s}
  @keyframes wave { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.6)} }
  .voice-dur { font-size:12px; opacity:.7; }

  .date-divider { text-align:center; font-size:12px; color:var(--text2); margin:10px 0; }
  .date-divider span { background:var(--bg3); padding:4px 12px; border-radius:20px; }

  /* Input bar */
  .input-bar {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px 14px; background:var(--bg);
    border-top:1px solid var(--border); flex-shrink:0;
    padding-bottom:calc(10px + env(safe-area-inset-bottom,0));
  }
  .input-wrap {
    flex:1; display:flex; align-items:center; gap:8px;
    background:var(--bg3); border-radius:24px; padding:8px 14px;
    border:1.5px solid var(--border);
  }
  .input-wrap input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-size:14px; font-family:inherit;
  }
  .ibar-btn {
    width:38px; height:38px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    border:none; cursor:pointer; display:flex; align-items:center;
    justify-content:center; font-size:18px; flex-shrink:0;
    box-shadow:0 2px 12px rgba(124,92,252,.4); transition:.2s;
  }
  .ibar-btn:active { transform:scale(.9); }
  .ibar-icon { font-size:22px; cursor:pointer; padding:4px; }
  #voice-indicator {
    display:none; align-items:center; gap:8px;
    flex:1; padding:8px 14px; background:rgba(252,92,125,.15);
    border-radius:24px; border:1.5px solid rgba(252,92,125,.3);
  }
  #voice-indicator.active { display:flex; }
  .rec-dot { width:10px; height:10px; border-radius:50%; background:var(--accent2); animation:blink .8s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ===== STATUS SCREEN ===== */
  #status-screen { background:var(--bg); }
  .my-status {
    display:flex; align-items:center; gap:14px;
    padding:14px 18px; border-bottom:1px solid var(--border);
    cursor:pointer;
  }
  .add-story-btn {
    width:52px; height:52px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:26px; flex-shrink:0;
  }
  .status-list-section { padding:12px 18px 6px; font-size:13px; color:var(--text2); font-weight:600; }
  .status-list { overflow-y:auto; flex:1; }
  .status-list::-webkit-scrollbar { display:none; }

  /* Status Viewer */
  #story-viewer {
    position:fixed; inset:0; background:#000; z-index:200;
    display:none; flex-direction:column;
  }
  #story-viewer.active { display:flex; }
  .sv-top { padding:48px 16px 12px; position:relative; z-index:2; }
  .sv-bars { display:flex; gap:4px; margin-bottom:14px; }
  .sv-bar { flex:1; height:3px; background:rgba(255,255,255,.3); border-radius:2px; overflow:hidden; }
  .sv-fill { height:100%; background:#fff; border-radius:2px; }
  .sv-fill.active { animation:svfill 4s linear forwards; }
  .sv-fill.done { width:100%; }
  @keyframes svfill { from{width:0} to{width:100%} }
  .sv-user { display:flex; align-items:center; gap:10px; }
  .sv-avatar { width:38px; height:38px; border-radius:50%; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:20px; }
  .sv-name { font-size:15px; font-weight:600; color:#fff; }
  .sv-time { font-size:12px; color:rgba(255,255,255,.6); }
  .sv-close { position:absolute; top:48px; right:16px; font-size:24px; color:#fff; cursor:pointer; padding:4px; z-index:3; }
  .sv-body { flex:1; display:flex; align-items:center; justify-content:center; font-size:80px; position:relative; }
  .sv-nav { position:absolute; inset:0; display:flex; }
  .sv-nav-left { flex:1; } .sv-nav-right { flex:1; }
  .sv-caption { padding:24px 20px 40px; font-size:16px; color:#fff; text-align:center; font-weight:500; }

  /* ===== PROFILE SCREEN ===== */
  #profile-screen { background:var(--bg); overflow-y:auto; }
  #profile-screen::-webkit-scrollbar { display:none; }
  .profile-header {
    background:linear-gradient(160deg, var(--accent), var(--accent2));
    padding:50px 24px 30px; text-align:center; position:relative;
  }
  .profile-avatar-big {
    width:90px; height:90px; border-radius:50%; margin:0 auto 14px;
    background:rgba(255,255,255,.2); display:flex; align-items:center;
    justify-content:center; font-size:48px; border:3px solid rgba(255,255,255,.4);
    position:relative;
  }
  .profile-edit-icon {
    position:absolute; bottom:2px; right:2px; width:26px; height:26px;
    border-radius:50%; background:#fff; display:flex; align-items:center;
    justify-content:center; font-size:14px; cursor:pointer;
  }
  .profile-name { font-size:22px; font-weight:700; color:#fff; }
  .profile-bio { font-size:13px; color:rgba(255,255,255,.8); margin-top:4px; }
  .profile-stats { display:flex; gap:0; margin-top:18px; }
  .pstat { flex:1; text-align:center; }
  .pstat-num { font-size:20px; font-weight:700; color:#fff; }
  .pstat-label { font-size:11px; color:rgba(255,255,255,.75); margin-top:1px; }
  .pstat + .pstat { border-left:1px solid rgba(255,255,255,.2); }

  .profile-section { padding:18px 20px; border-bottom:1px solid var(--border); }
  .psec-title { font-size:12px; color:var(--text2); font-weight:600; margin-bottom:14px; letter-spacing:.5px; text-transform:uppercase; }
  .prow {
    display:flex; align-items:center; gap:14px; padding:10px 0;
    border-bottom:1px solid rgba(255,255,255,.04); cursor:pointer;
  }
  .prow:last-child { border-bottom:none; }
  .prow-icon { width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .prow-text { flex:1; font-size:15px; font-weight:500; }
  .prow-arr { color:var(--text2); font-size:18px; }
  .prow-toggle {
    width:44px; height:24px; border-radius:12px; background:var(--bg3);
    position:relative; cursor:pointer; transition:.3s; border:1.5px solid var(--border);
  }
  .prow-toggle.on { background:var(--accent); border-color:var(--accent); }
  .prow-toggle::after {
    content:''; position:absolute; top:2px; left:2px;
    width:16px; height:16px; border-radius:50%; background:#fff;
    transition:.3s;
  }
  .prow-toggle.on::after { left:calc(100% - 18px); }
  .logout-btn {
    margin:20px 20px 30px; padding:14px; border-radius:14px;
    background:rgba(252,92,125,.15); border:1.5px solid rgba(252,92,125,.3);
    color:var(--accent2); font-size:15px; font-weight:600;
    font-family:inherit; cursor:pointer; width:calc(100% - 40px);
    transition:.2s;
  }
  .logout-btn:active { transform:scale(.97); }

  /* ===== STORY CREATOR ===== */
  #story-creator {
    position:fixed; inset:0; background:var(--bg); z-index:150;
    display:none; flex-direction:column;
  }
  #story-creator.active { display:flex; }
  .sc-top { padding:52px 20px 16px; display:flex; align-items:center; gap:14px; border-bottom:1px solid var(--border); }
  .sc-body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:30px 24px; }
  .sc-preview {
    width:100%; flex:1; border-radius:20px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center; font-size:60px;
    max-height:280px;
  }
  .sc-input-wrap { width:100%; }
  .sc-input {
    width:100%; padding:14px 18px; border-radius:14px;
    background:var(--bg3); border:1.5px solid var(--border);
    color:var(--text); font-size:15px; font-family:inherit; outline:none;
  }
  .sc-post-btn {
    width:100%; padding:15px; border-radius:14px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:#fff; font-size:16px; font-weight:600; font-family:inherit;
    border:none; cursor:pointer;
  }
  .emoji-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .emoji-btn { font-size:32px; cursor:pointer; padding:4px; border-radius:10px; transition:.2s; }
  .emoji-btn.selected { background:var(--bg3); transform:scale(1.2); }

  /* Image preview overlay */
  #img-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.95); z-index:300;
    display:none; align-items:center; justify-content:center; flex-direction:column;
  }
  #img-overlay.active { display:flex; }
  #img-overlay img { max-width:90%; max-height:80vh; border-radius:12px; }
  #img-overlay .close-img { position:absolute; top:20px; right:20px; font-size:28px; color:#fff; cursor:pointer; }

  /* Toast */
  .toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:10px 20px; font-size:14px; color:var(--text);
    opacity:0; transition:.3s; z-index:500; white-space:nowrap;
    box-shadow:0 4px 20px rgba(0,0,0,.4);
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* Emoji picker */
  .emoji-picker {
    position:absolute; bottom:70px; left:14px; right:14px;
    background:var(--bg3); border:1px solid var(--border); border-radius:18px;
    padding:14px; display:none; z-index:10;
    box-shadow:0 -4px
